<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxMate - Smart Tax Planning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const text = {
            en: { title: "TaxMate.", salary: "Annual Salary", bonus: "Annual Bonus", social: "Social Security (9,000)", summary: "Summary", net: "Net Income", tax: "Estimated Tax", ai: "✨ AI Smart Optimize", tips: "Tax Tips", close: "Close" },
            th: { title: "TaxMate.", salary: "เงินเดือนทั้งปี (บาท)", bonus: "โบนัสทั้งปี (บาท)", social: "จ่ายประกันสังคม (9,000 บาท)", summary: "สรุปยอด", net: "เงินได้สุทธิ", tax: "ภาษีที่ต้องจ่าย", ai: "✨ AI วิเคราะห์แผนลดหย่อน", tips: "เกร็ดความรู้ภาษี", close: "เข้าใจแล้ว" }
        };

        const TaxCalculator = () => {
            const [isDark, setIsDark] = useState(false);
            const [lang, setLang] = useState('th');
            const [inc, setInc] = useState(''); const [bon, setBon] = useState('');
            const [soc, setSoc] = useState(true); const [life, setLife] = useState('');
            const [ssf, setSsf] = useState(''); const [rmf, setRmf] = useState('');
            const [esg, setEsg] = useState(''); const [tips, setTips] = useState(false);
            const [ai, setAi] = useState(null); const [bk, setBk] = useState(false);

            const fmt = (v) => v ? parseInt(v.toString().replace(/[^0-9]/g,'')).toLocaleString() : '';
            const raw = (v) => parseInt(v.toString().replace(/,/g,'')) || 0;
            const handle = (v, s, m = 999999999) => {
                let n = v.replace(/[^0-9]/g,'');
                if(!n) return s('');
                if(parseInt(n) > m) n = m.toString();
                s(fmt(n));
            };

            const calculate = () => {
                const total = raw(inc) + raw(bon);
                const deduct = Math.min(total*0.5, 100000) + 60000 + (soc?9000:0) + Math.min(raw(life), 100000) + Math.min(raw(ssf)+raw(rmf), 500000) + Math.min(raw(esg), 300000);
                const net = Math.max(0, total - deduct);
                let tax = 0, rem = net;
                const brackets = [{l:150000, r:0, m:0}, {l:150000, r:0.05, m:150000}, {l:200000, r:0.1, m:300000}, {l:250000, r:0.15, m:500000}, {l:250000, r:0.2, m:750000}];
                const resB = [];
                for(let b of brackets) {
                    if(rem <= 0) break;
                    let txl = Math.min(rem, b.l), t = txl * b.r;
                    tax += t; rem -= txl;
                    if(txl > 0) resB.push({r: Math.round(b.r*100), t, m: b.m});
                }
                return { total, net, tax, resB, eff: total ? ((tax/total)*100).toFixed(2) : 0 };
            };

            const runAI = () => {
                const { net, resB } = calculate();
                if(net <= 150000) return setAi(lang==='th'?"🎉 ไม่ต้องเสียภาษีครับ! แผนคุณดีแล้ว":"🎉 0 Tax! Well planned.");
                const top = resB[resB.length-1];
                const diff = net - top.m;
                setAi(lang==='th'?`💡 AI: อยู่ฐาน ${top.r}% ลงทุนเพิ่มอีก ฿${Math.ceil(diff).toLocaleString()} จะลดฐานภาษีได้!` : `💡 AI: At ${top.r}% bracket. Invest ฿${Math.ceil(diff).toLocaleString()} to drop bracket!`);
            };

            const d = calculate(), t = text[lang];
            const theme = isDark ? {bg:'bg-[#111]', crd:'bg-[#000] border-[#333]', tx:'text-white', s:'text-gray-400', in:'bg-[#111] border-[#333] text-white', ai:'bg-blue-900/30 text-blue-300 border-blue-800'} : {bg:'bg-[#F5F5F5]', crd:'bg-white border-gray-200', tx:'text-black', s:'text-gray-500', in:'bg-gray-50 border-gray-200 text-black', ai:'bg-blue-50 text-blue-800 border-blue-200'};

            return (
                <div className={`min-h-screen ${theme.bg} ${theme.tx} p-4 md:p-12 transition-all relative pb-20`}>
                    <div className="max-w-6xl mx-auto">
                        <div className="flex justify-between items-center mb-10">
                            <h1 className="text-4xl font-black tracking-tighter">{t.title}</h1>
                            <div className="flex gap-2">
                                <button onClick={()=>setLang(lang==='th'?'en':'th')} className="px-4 py-2 border rounded-full text-xs font-bold">{lang==='th'?'EN':'TH'}</button>
                                <button onClick={()=>setIsDark(!isDark)} className="px-4 py-2 border rounded-full text-xs font-bold">{isDark?'Light':'Dark'}</button>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className={`lg:col-span-7 p-8 rounded-3xl border ${theme.crd} space-y-8 shadow-sm`}>
                                <section className="space-y-4">
                                    <h2 className="text-lg font-bold opacity-70">{lang==='th'?'รายได้ทั้งปี':'Income'}</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-bold mb-1 block uppercase">{t.salary}</label><input type="text" value={inc} onChange={e=>handle(e.target.value,setInc)} className={`w-full p-4 rounded-2xl border outline-none ${theme.in}`} placeholder="0" /></div>
                                        <div><label className="text-[10px] font-bold mb-1 block uppercase">{t.bonus}</label><input type="text" value={bon} onChange={e=>handle(e.target.value,setBon)} className={`w-full p-4 rounded-2xl border outline-none ${theme.in}`} placeholder="0" /></div>
                                    </div>
                                </section>
                                <section className="space-y-4">
                                    <h2 className="text-lg font-bold opacity-70">{lang==='th'?'การลงทุน & ลดหย่อน':'Investments'}</h2>
                                    <label className="flex items-center gap-3 cursor-pointer"><input type="checkbox" checked={soc} onChange={e=>setSoc(e.target.checked)} className="w-5 h-5 rounded" /> <span className="text-sm font-medium">{t.social}</span></label>
                                    <div className="grid grid-cols-2 gap-4">
                                        {[ ['ประกันชีวิต',100000,setLife,life], ['SSF',200000,setSsf,ssf], ['RMF',500000,setRmf,rmf], ['ThaiESG',300000,setEsg,esg] ].map(([l,m,s,v])=>(
                                            <div key={l}><label className="text-[10px] font-bold mb-1 block">{l}</label><input type="text" value={v} onChange={e=>handle(e.target.value,s,m)} className={`w-full p-3 rounded-xl border outline-none ${theme.in}`} placeholder="0" /></div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                            <div className="lg:col-span-5">
                                <div className={`sticky top-8 p-8 rounded-3xl border ${theme.crd} shadow-xl space-y-6`}>
                                    <div className="flex justify-between items-center"><span className={theme.s}>{t.net}</span><span className="font-black text-xl">฿{d.net.toLocaleString()}</span></div>
                                    <div className={`p-8 rounded-3xl text-center border ${isDark?'bg-zinc-900 border-zinc-800':'bg-gray-50 border-gray-100'}`}>
                                        <p className="text-[10px] font-bold opacity-50 uppercase tracking-widest">{t.tax}</p>
                                        <h3 className="text-5xl font-black my-2">฿{d.tax.toLocaleString()}</h3>
                                        <span className="text-[10px] bg-black text-white px-3 py-1 rounded-full font-bold">Rate: {d.eff}%</span>
                                    </div>
                                    <button onClick={runAI} className="w-full py-4 rounded-2xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/20">{t.ai}</button>
                                    {ai && <div className={`p-4 rounded-2xl border text-sm font-medium animate-in ${theme.ai}`}>{ai}</div>}
                                    <button onClick={()=>setBk(!bk)} className="w-full py-2 text-xs font-bold opacity-40 hover:opacity-100">{lang==='th'?'ดูรายละเอียดฐานภาษี':'Breakdown'}</button>
                                    {bk && d.resB.map((b,i)=>(<div key={i} className="flex justify-between text-xs opacity-60 px-2 animate-in"><span>ฐาน {b.r}%</span><span>฿{b.t.toLocaleString()}</span></div>))}
                                </div>
                            </div>
                        </div>
                    </div>
                    <button onClick={()=>setTips(true)} className="fixed bottom-8 right-8 w-14 h-14 bg-black text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all">💡</button>
                    {tips && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
                            <div className={`w-full max-w-md p-8 rounded-[2rem] border ${theme.crd} animate-in`}>
                                <h3 className="text-2xl font-black mb-6">💡 {t.tips}</h3>
                                <div className="space-y-4 text-sm opacity-80 leading-relaxed"><p>• 1.5 แสนแรก ฟรีภาษี</p><p>• SSF/RMF ช่วยสะสมความมั่งคั่งแบบ DCA</p><p>• ประกันชีวิตลดหย่อนได้ตามจ่ายจริงสูงสุด 1 แสน</p></div>
                                <button onClick={()=>setTips(false)} className="w-full mt-8 py-4 bg-black text-white rounded-2xl font-bold">{t.close}</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TaxCalculator />);
    </script>
</body>
</html>
