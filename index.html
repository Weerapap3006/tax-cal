<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxMate - Smart Tax Planning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const TaxCalculator = () => {
            const [isDark, setIsDark] = useState(false);
            const [lang, setLang] = useState('th');
            const [annualIncome, setAnnualIncome] = useState('');
            const [bonus, setBonus] = useState('');
            const [lifeIns, setLifeIns] = useState('');
            const [ssf, setSsf] = useState('');
            const [rmf, setRmf] = useState('');
            const [thaiEsg, setThaiEsg] = useState('');
            const [aiAdvice, setAiAdvice] = useState(null);

            const fmt = (v) => v ? parseInt(v.toString().replace(/[^0-9]/g, '')).toLocaleString() : '';
            const raw = (v) => parseInt(v.toString().replace(/,/g, '')) || 0;
            const h = (v, s, m = 999999999) => {
                let n = v.replace(/[^0-9]/g, '');
                if (!n) return s('');
                if (parseInt(n) > m) n = m.toString();
                s(fmt(n));
            };

            const calc = () => {
                const inc = raw(annualIncome), bon = raw(bonus), total = inc + bon;
                const deduct = 100000 + 60000 + 9000 + Math.min(raw(lifeIns), 100000) + Math.min(raw(ssf)+raw(rmf), 500000) + Math.min(raw(thaiEsg), 300000);
                const net = Math.max(0, total - deduct);
                let tax = 0, rem = net;
                const brks = [{l:150000, r:0, m:0}, {l:150000, r:0.05, m:150000}, {l:200000, r:0.1, m:300000}, {l:250000, r:0.15, m:500000}, {l:250000, r:0.2, m:750000}];
                const resB = [];
                for (let b of brks) {
                    if (rem <= 0) break;
                    let txl = Math.min(rem, b.l), t = txl * b.r;
                    tax += t; rem -= txl;
                    if (txl > 0) resB.push({r: Math.round(b.r*100), t, m: b.m});
                }
                return { total, net, tax, resB, eff: total ? ((tax/total)*100).toFixed(2) : 0 };
            };

            const runAI = () => {
                const { net, resB } = calc();
                if (net <= 150000) return setAiAdvice(lang === 'th' ? "🎉 แผนการเงินดีมากครับ! ไม่ต้องเสียภาษี" : "🎉 0 Tax Liability!");
                const top = resB[resB.length - 1];
                const diff = net - top.m;
                setAiAdvice(lang === 'th' ? `💡 AI: อยู่ฐาน ${top.r}% ลดหย่อนอีก ฿${Math.ceil(diff).toLocaleString()} จะลดฐานภาษีลงได้!` : `💡 AI: Invest ฿${Math.ceil(diff).toLocaleString()} more to drop bracket!`);
            };

            const d = calc(), c = isDark ? 'bg-[#111] text-white' : 'bg-[#F5F5F5] text-black';
            const card = isDark ? 'bg-black border-[#333]' : 'bg-white border-gray-200';
            const aiBox = isDark ? 'bg-blue-900/30 text-blue-300 border-blue-800' : 'bg-blue-50 text-blue-800 border-blue-200';

            return (
                <div className={`min-h-screen ${c} p-4 md:p-12 transition-all`}>
                    <div className="max-w-4xl mx-auto">
                        <div className="flex justify-between items-center mb-10">
                            <h1 className="text-4xl font-black tracking-tighter">TaxMate.</h1>
                            <div className="flex gap-2">
                                <button onClick={()=>setLang(lang==='th'?'en':'th')} className="p-2 border rounded-full text-xs font-bold">{lang==='th'?'EN':'TH'}</button>
                                <button onClick={()=>setIsDark(!isDark)} className="p-2 border rounded-full text-xs font-bold">{isDark?'Light':'Dark'}</button>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div className={`p-8 rounded-3xl border ${card} shadow-sm space-y-6`}>
                                <div><label className="text-xs font-bold opacity-50 mb-2 block">{lang==='th'?'เงินเดือนทั้งปี':'Salary'}</label><input type="text" value={annualIncome} onChange={e=>h(e.target.value,setAnnualIncome)} className={`w-full p-4 rounded-xl border outline-none ${isDark?'bg-[#111] border-[#333]':'bg-gray-50'}`} placeholder="0" /></div>
                                <div className="grid grid-cols-2 gap-4">
                                    {[['ประกันชีวิต',100000,setLifeIns,lifeIns],['SSF/RMF',500000,setSsf,ssf],['ThaiESG',300000,setThaiEsg,thaiEsg]].map(([l,m,s,v])=>(
                                        <div key={l}><label className="text-[10px] font-bold opacity-50 block">{l}</label><input type="text" value={v} onChange={e=>h(e.target.value,s,m)} className={`w-full p-3 rounded-xl border outline-none ${isDark?'bg-[#111] border-[#333]':'bg-gray-50'}`} placeholder="0" /></div>
                                    ))}
                                </div>
                            </div>
                            <div className={`p-8 rounded-3xl border ${card} shadow-xl space-y-6`}>
                                <div className={`p-6 rounded-2xl text-center ${isDark?'bg-zinc-900':'bg-gray-50'}`}>
                                    <p className="text-[10px] font-bold opacity-50 uppercase">{lang==='th'?'ภาษีที่ต้องจ่าย':'Tax to Pay'}</p>
                                    <h3 className="text-5xl font-black my-2">฿{d.tax.toLocaleString()}</h3>
                                    <span className="text-[10px] bg-black text-white px-2 py-1 rounded-full">Rate: {d.eff}%</span>
                                </div>
                                <button onClick={runAI} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/20">{lang==='th'?'✨ AI วิเคราะห์แผน':'✨ AI Optimize'}</button>
                                {aiAdvice && <div className={`p-4 rounded-xl border text-sm font-medium animate-in ${aiBox}`}>{aiAdvice}</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TaxCalculator />);
    </script>
</body>
</html>
